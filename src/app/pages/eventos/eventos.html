<div class="page-container">

  <div class="form-card">

    <div class="card-header">

      <div>

        <h2>
          Registrar Evento
        </h2>

        <p>
          Crea y administra eventos municipales.
        </p>

      </div>

      <a
        routerLink="/dashboard-municipio"
        class="back-button"
        title="Volver">

        <i class="bi bi-arrow-left"></i>

      </a>

    </div>

    <form>

      <div class="form-grid">

        <!-- NOMBRE -->

        <div class="form-group">

          <label>
            Nombre del Evento
          </label>

          <input
            type="text"
            class="form-control"
            [(ngModel)]="nombreEvento"
            name="nombreEvento"
            placeholder="Ej: Feria Costumbrista">

        </div>

        <!-- CATEGORÍA -->

        <div class="form-group">

          <label>
            Categoría
          </label>

          <select
            class="form-control"
            [(ngModel)]="selectedCategoria"
            name="categoria">

            <option [ngValue]="null">

              Seleccione categoría

            </option>

            <option
              *ngFor="let categoria of categorias"
              [ngValue]="categoria.idCategoria">

              {{ categoria.nombre }}

            </option>

          </select>

        </div>

        <!-- FECHA -->

        <div class="form-group">

          <label>
            Fecha
          </label>

          <input
            type="date"
            class="form-control"
            [(ngModel)]="fechaSeleccionada"
            name="fechaSeleccionada"
            [min]="fechaMinima">

        </div>

        <!-- HORA -->

        <div class="form-group">

          <label>
            Hora
          </label>

          <input
            type="time"
            class="form-control"
            [(ngModel)]="horaSeleccionada"
            name="horaSeleccionada">

        </div>

        <!-- AGREGAR FECHA -->

        <div class="form-group full-width">

          <button
            type="button"
            class="btn btn-success"
            (click)="agregarFecha()">

            <i class="bi bi-plus-circle"></i>

            Agregar Fecha

          </button>

        </div>

        <!-- TABLA FECHAS -->

       <div class="fechas-card full-width" *ngIf="fechasEvento.length > 0">

    <h5>
        <i class="bi bi-calendar-event"></i>
        Fechas del Evento
    </h5>

    <div
        class="fecha-item"
        *ngFor="let fecha of fechasEvento; let i=index">

        <div class="fecha-info">

            <span>
                <i class="bi bi-calendar3"></i>
                {{ fecha.fecha }}
            </span>

            <span>
                <i class="bi bi-clock"></i>
                {{ fecha.horario }}
            </span>

        </div>

        <button
            class="btn-delete"
            type="button"
            (click)="eliminarFecha(i)">

            <i class="bi bi-trash"></i>

        </button>

    </div>

</div>

        <!-- DIRECCIÓN -->

        <div class="form-group full-width">

          <label>
            Dirección
          </label>

          <input
            type="text"
            class="form-control"
            [(ngModel)]="direccion"
            name="direccion"
            placeholder="Dirección donde se realizará el evento">

        </div>

        <!-- PAGADO -->

        <div class="form-group">

          <label>

            Pagado

          </label>

          <select
            class="form-control"
            [(ngModel)]="esPagado"
            name="esPagado">

            <option [ngValue]="true">

              Sí

            </option>

            <option [ngValue]="false">

              No

            </option>

          </select>

        </div>

        <!-- ESTADO -->

        <div class="form-group">

          <label>

            Estado

          </label>

          <select
            class="form-control"
            [(ngModel)]="estado"
            name="estado">

            <option>

              Disponible

            </option>

            <option>

              Suspendido

            </option>

            <option>

              Cancelado

            </option>

            <option>

              Finalizado

            </option>

          </select>

        </div>

        <!-- DESCRIPCIÓN -->

        <div class="form-group full-width">

          <label>

            Descripción

          </label>

          <textarea
            rows="5"
            class="form-control"
            [(ngModel)]="descripcionEvento"
            name="descripcionEvento"
            placeholder="Describe el evento...">

          </textarea>

        </div>

        <!-- CHECKBOX -->

        <div class="checkbox-grid full-width">

          <label class="checkbox-item">

            <input
              type="checkbox"
              [(ngModel)]="petFriendly"
              name="petFriendly">

            Pet Friendly

          </label>

          <label class="checkbox-item">

            <input
              type="checkbox"
              [(ngModel)]="accesibilidadDiscapacidad"
              name="accesibilidadDiscapacidad">

            Accesible para personas con discapacidad

          </label>

          <label class="checkbox-item">

            <input
              type="checkbox"
              [(ngModel)]="estacionamiento"
              name="estacionamiento">

            Estacionamiento disponible

          </label>

        </div>

        <!-- INFORMACIÓN -->

        <div class="alert-event full-width">

          <i class="bi bi-info-circle"></i>

          La URL pública y el código QR del evento se generarán automáticamente una vez registrado el evento.

        </div>

        <!-- BOTÓN -->

        <div class="form-actions full-width">

          <button
            type="button"
            class="btn btn-primary"
            (click)="guardarEvento()">

            Guardar Evento

          </button>

        </div>

      </div>

    </form>

  </div>

</div>

<div class="dashboard-container">

   <app-sidebar-admin></app-sidebar-admin>

  <div class="main-content">
<div class="form-card">

  <div class="header-section">

    <div>

      <h2>
        Mantenedor de Municipios
      </h2>

      <p>
        Administración de municipios y responsable de contacto.
      </p>

    </div>

    <a routerLink="/dashboard-admin" class="btn btn-secondary">
      <i class="bi bi-arrow-left"></i>
      Volver al Dashboard
    </a>

  </div>

  <h4>
    Información del Municipio
  </h4>

  <div class="row">

    <div class="col-md-6 mb-3">

      <label class="form-label">
        Región
      </label>

      <input type="text" class="form-control" value="Región Metropolitana de Santiago" readonly>

    </div>

    <div class="col-md-6 mb-3">

      <label class="form-label">
        Provincia
      </label>

      <select class="form-select" [(ngModel)]="selectedProvinciaId" name="provincia"
        (change)="seleccionarProvincia($event)">

        <option [ngValue]="null" selected>
          Seleccione Provincia
        </option>
        <option *ngFor="let provincia of provincias" [value]="provincia.idProvincia">
          {{ provincia.nombre }}
        </option>

      </select>

    </div>

    <div class="col-md-6 mb-3">

      <label class="form-label">
        Comuna
      </label>

      <select class="form-select" [(ngModel)]="selectedComunaId" name="comuna" [disabled]="comunas.length === 0"
        (change)="seleccionarComuna($event)">

        <option [ngValue]="null">
          Seleccione Comuna
        </option>

        <option *ngFor="let comuna of comunas" [value]="comuna.idComuna">
          {{ comuna.nombre }}
        </option>

      </select>

    </div>

    <div class="col-md-6 mb-3">

      <label class="form-label">
        Municipalidad
      </label>

      <input type="text" class="form-control" [value]="municipalidad" readonly>

    </div>

  </div>

  <hr class="my-4">

  <h4>
    Responsable Municipal
  </h4>

  <div class="row">

    <div class="col-md-12 mb-3">

      <label class="form-label">
        Nombre Responsable
      </label>

      <input type="text" class="form-control" [(ngModel)]="nombreResponsable" name="nombreResponsable"
        placeholder="Ej: Juan Carlos Pérez Soto">

    </div>

    <div class="col-md-6 mb-3">

      <label class="form-label">
        Correo Electrónico
      </label>

      <input type="email" class="form-control" [(ngModel)]="correo" name="correo" placeholder="correo@municipalidad.cl">

    </div>

    <div class="col-md-6 mb-3">

      <label class="form-label">
        Teléfono Celular
      </label>

      <div class="input-group">

        <span class="input-group-text">
          +56
        </span>
        <input type="text" class="form-control" [(ngModel)]="telefono" name="telefono" maxlength="9"
          placeholder="912345678" (keypress)="permitirSoloNumeros($event)">

      </div>

    </div>

   <div class="actions-container">

      <button type="button" class="btn btn-clear" (click)="limpiarFormulario()">
        <i class="bi bi-arrow-clockwise"></i>
        Limpiar Formulario
      </button>

      <button type="button" class="btn btn-save" (click)="guardarMunicipio()">
        <i class="bi bi-floppy"></i>
        Guardar Municipio
      </button>

    </div>

  </div>

</div>

</div>

</div>

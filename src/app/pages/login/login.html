<div class="video-container">

    <video autoplay muted loop playsinline class="background-video">
        <source src="/video/videodemo.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <div class="content-container">

        <!-- LADO IZQUIERDO -->
        <div class="left-section">

            <div class="branding">

                <img src="logo/logo.png" alt="Logo DondeVamos" class="logo-image">

                <h1 class="main-title">
                    DondeVamos
                </h1>

                <p class="main-description">
                    Plataforma para la gestión y difusión
                    de eventos municipales.
                </p>

            </div>

        </div>

        <!-- LADO DERECHO -->
        <div class="right-section">

            <div class="login-card">

                <div class="mb-5">

                    <h2 class="login-title">
                        Bienvenido
                    </h2>

                    <p class="login-subtitle">
                        Inicia sesión para continuar
                    </p>

                </div>

                <form>

                    <!-- CORREO -->

                    <div class="mb-4">

                        <label class="form-label">
                            Correo electrónico
                        </label>

                        <input class="form-control" type="email" name="correo" [(ngModel)]="correo"
                            placeholder="Correo electrónico">

                    </div>

                    <!-- PASSWORD -->

                    <div class="mb-4">

                        <label class="form-label">
                            Contraseña
                        </label>

                        <input class="form-control" type="password" name="password" [(ngModel)]="password"
                            placeholder="Contraseña">

                    </div>

                    <!-- BOTON INICIAR SESION -->

                    <button type="button" class="login-btn" (click)="iniciarSesion()">

                        <i class="bi bi-box-arrow-in-right"></i>
                        Ingresar

                    </button>

                    <div class="forgot-password">

                        <a (click)="recuperarPassword()">
                            Establecer / recuperar contraseña
                        </a>

                    </div>





                </form>

            </div>

        </div>

    </div>

</div>
